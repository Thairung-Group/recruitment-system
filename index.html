/* ---------- 1) STATE & PERSISTENCE ---------- */
const STORAGE_KEY = 'hiresense_v1';
const SESSION_KEY = 'hiresense_session_v1';
const FILE_BLOB_KEY = 'hiresense_files_v1';

/* In-memory cache of file dataURLs keyed by file id. Mirrored to localStorage when possible. */
let _fileBlobs = (function () {
  try {
    const raw = localStorage.getItem(FILE_BLOB_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch (e) { return {}; }
})();
function saveFileBlobs() {
  try { localStorage.setItem(FILE_BLOB_KEY, JSON.stringify(_fileBlobs)); }
  catch (e) { /* quota exceeded — keep in-memory only */ console.warn('blob storage full, keeping in memory'); }
}
function setFileBlob(id, dataUrl) { _fileBlobs[id] = dataUrl; saveFileBlobs(); }
function getFileBlob(id) { return _fileBlobs[id] || null; }
function readFileAsDataURL(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = () => reject(r.error);
    r.readAsDataURL(file);
  });
}

/* Build a tiny one-page PDF data URL containing a label — used to seed demo files
   so the in-page PDF viewer has something to render without re-uploading. */
function makeDemoPdfDataUrl(title, subtitle = '') {
  const esc = (s) => s.replace(/\\/g, '\\\\').replace(/\(/g, '\\(').replace(/\)/g, '\\)');
  const lines = [
    `BT /F1 22 Tf 50 780 Td (${esc(title)}) Tj ET`,
    `BT /F1 12 Tf 50 750 Td (${esc(subtitle || 'Demo PDF — Thairung Group Recruitment System')}) Tj ET`,
    `BT /F1 11 Tf 50 720 Td (This is a sample PDF generated for the in-page viewer demo.) Tj ET`,
    `BT /F1 11 Tf 50 700 Td (Upload your own file to view real content here.) Tj ET`,
  ].join('\n');
  const objs = [
    '<</Type/Catalog/Pages 2 0 R>>',
    '<</Type/Pages/Kids[3 0 R]/Count 1>>',
    '<</Type/Page/Parent 2 0 R/MediaBox[0 0 595 842]/Contents 4 0 R/Resources<</Font<</F1 5 0 R>>>>>>',
    `<</Length ${lines.length}>>\nstream\n${lines}\nendstream`,
    '<</Type/Font/Subtype/Type1/BaseFont/Helvetica>>',
  ];
  let pdf = '%PDF-1.4\n';
  const offsets = [];
  objs.forEach((o, i) => { offsets.push(pdf.length); pdf += `${i + 1} 0 obj\n${o}\nendobj\n`; });
  const xrefStart = pdf.length;
  pdf += `xref\n0 ${objs.length + 1}\n0000000000 65535 f \n`;
  offsets.forEach(off => { pdf += String(off).padStart(10, '0') + ' 00000 n \n'; });
  pdf += `trailer\n<</Size ${objs.length + 1}/Root 1 0 R>>\nstartxref\n${xrefStart}\n%%EOF`;
  // base64 encode
  let b = ''; for (let i = 0; i < pdf.length; i++) b += String.fromCharCode(pdf.charCodeAt(i) & 0xff);
  return 'data:application/pdf;base64,' + btoa(b);
}

/* Build a short audible WAV (sine sweep) data URL — used to seed the demo audio file. */
function makeDemoAudioDataUrl(seconds = 3) {
  const sampleRate = 16000;
  const numSamples = Math.floor(sampleRate * seconds);
  const dataSize = numSamples * 2;
  const buffer = new ArrayBuffer(44 + dataSize);
  const view = new DataView(buffer);
  const writeStr = (off, s) => { for (let i = 0; i < s.length; i++) view.setUint8(off + i, s.charCodeAt(i)); };
  writeStr(0, 'RIFF'); view.setUint32(4, 36 + dataSize, true); writeStr(8, 'WAVE');
  writeStr(12, 'fmt '); view.setUint32(16, 16, true);
  view.setUint16(20, 1, true); view.setUint16(22, 1, true);
  view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true);
  view.setUint16(32, 2, true); view.setUint16(34, 16, true);
  writeStr(36, 'data'); view.setUint32(40, dataSize, true);
  for (let i = 0; i < numSamples; i++) {
    const t = i / sampleRate;
    const freq = 330 + 180 * Math.sin(2 * Math.PI * 0.4 * t);
    const env = Math.min(1, t / 0.05) * Math.min(1, (seconds - t) / 0.1);
    const s = Math.sin(2 * Math.PI * freq * t) * 0.18 * env;
    view.setInt16(44 + i * 2, Math.max(-1, Math.min(1, s)) * 32767, true);
  }
  const bytes = new Uint8Array(buffer);
  let bin = ''; for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return 'data:audio/wav;base64,' + btoa(bin);
}

/* Seed sample blobs for built-in demo candidates so the viewer works out of the box. */
function seedDemoBlobs() {
  const seeds = {
    f1: () => makeDemoPdfDataUrl('Natthapol Resume', 'Senior Frontend Developer — sample CV'),
    f2: () => makeDemoPdfDataUrl('JD: Senior Frontend Developer', 'Job Description — sample'),
    f3: () => makeDemoAudioDataUrl(4),
    f4: () => makeDemoPdfDataUrl('Priya Resume', 'Data Analyst — sample CV'),
    f5: () => makeDemoPdfDataUrl('JD: Data Analyst', 'Job Description — sample'),
  };
  let dirty = false;
  for (const id in seeds) {
    if (!_fileBlobs[id]) { _fileBlobs[id] = seeds[id](); dirty = true; }
  }
  if (dirty) saveFileBlobs();
}
seedDemoBlobs();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(defaultState));
      return JSON.parse(JSON.stringify(defaultState));
    }
    return JSON.parse(raw);
  } catch (e) {
    return JSON.parse(JSON.stringify(defaultState));
  }
}
function saveState(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }
function loadSession() {
  try { return JSON.parse(sessionStorage.getItem(SESSION_KEY) || 'null'); } catch { return null; }
}
function saveSession(s) {
  if (s) sessionStorage.setItem(SESSION_KEY, JSON.stringify(s));
  else sessionStorage.removeItem(SESSION_KEY);
}

let state = loadState();
let session = loadSession();

/* ---------- 2) UTILITIES ---------- */
const $ = (sel) => document.querySelector(sel);
const uid = (p) => p + '_' + Math.random().toString(36).slice(2, 9);
const fmt = (iso) => {
  if (!iso) return '-';
  const d = new Date(iso);
  return d.toLocaleString('th-TH', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
};
const fmtDateOnly = (iso) => {
  if (!iso) return '-';
  return new Date(iso).toLocaleDateString('th-TH', { day: '2-digit', month: 'short', year: 'numeric' });
};
const sizeFmt = (b) => {
  if (b < 1024) return b + ' B';
  if (b < 1024*1024) return (b/1024).toFixed(1) + ' KB';
  return (b/1024/1024).toFixed(2) + ' MB';
};
function toast(msg, type='success') {
  const el = document.createElement('div');
  el.className = 'toast';
  el.style.background = type === 'error' ? '#dc2626' : type === 'warn' ? '#f59e0b' : '#1e293b';
  el.textContent = msg;
  $('#toast-root').appendChild(el);
  setTimeout(() => el.remove(), 2800);
}
function logActivity(action, entity, entityId, meta={}) {
  state.activityLogs.unshift({
    id: uid('log'), userId: session?.userId || null, userName: session?.name || 'system',
    role: session?.role || 'system', action, entity, entityId, meta,

};
const matchColor = (pct) => pct >= 80 ? '#10b981' : pct >= 60 ? '#3b82f6' : pct >= 40 ? '#f59e0b' : '#ef4444';
const matchLabel = (pct) => pct >= 80 ? 'สูงมาก' : pct >= 60 ? 'ดี' : pct >= 40 ? 'ปานกลาง' : 'ต่ำ';

/* ---------- 4) AI MATCHING (simulated) ---------- */
const SKILL_DICT = [
  'react','typescript','javascript','next.js','nextjs','tailwind','css','html','graphql','rest','api',
  'design system','performance','accessibility','sql','python','pandas','tableau','power bi','powerbi',
  'node.js','nodejs','postgresql','redis','aws','microservices','api design','system design','docker',
  'kubernetes','ci/cd','git','agile','scrum','recruitment','hris','leadership','communication',
  'employee relations','performance management','statistics','machine learning','computer science','mis',
  'computer engineering','tooic','toeic','english',
];
function extractSkills(text) {
  const lower = (text || '').toLowerCase();
  const found = new Set();
  SKILL_DICT.forEach(s => { if (lower.includes(s)) found.add(s); });
  return [...found];
}
function extractYears(text) {
  const m = (text || '').match(/(\d+)\s*(?:\+\s*)?(?:ปี|years?|yrs?)/i);
  return m ? parseInt(m[1]) : null;
}
function runAIMatching(resumeText, jdText) {
  const rs = extractSkills(resumeText);
  const js = extractSkills(jdText);
  const matched = rs.filter(s => js.includes(s));
  const missing = js.filter(s => !rs.includes(s));
  const skillScore = js.length === 0 ? 50 : Math.round((matched.length / js.length) * 100);

  const ry = extractYears(resumeText);
  const jy = extractYears(jdText);
  let expScore = 70;
  if (ry !== null && jy !== null) expScore = ry >= jy ? 100 : Math.round((ry / jy) * 100);

  const eduKeywords = ['ปริญญาตรี','ปริญญาโท','computer science','engineering','statistics','mis','human resources'];
  const eduMatch = eduKeywords.some(k => (resumeText||'').toLowerCase().includes(k.toLowerCase())
    && (jdText||'').toLowerCase().includes(k.toLowerCase())) ? 100 : 60;

  const overall = Math.round(skillScore * 0.55 + expScore * 0.30 + eduMatch * 0.15);

  const pros = [];
  const cons = [];
  if (matched.length > 0) pros.push(`มีทักษะตรงกับ JD ${matched.length} ทักษะ ได้แก่ ${matched.slice(0,5).join(', ')}`);
  if (ry && jy && ry >= jy) pros.push(`ประสบการณ์ ${ry} ปี ตรงตามเกณฑ์ที่ต้องการ ${jy} ปี`);
  if (eduMatch === 100) pros.push('การศึกษาตรงกับสายงาน');
  if (missing.length > 0) cons.push(`ขาดทักษะที่ JD ต้องการ ${missing.length} รายการ: ${missing.slice(0,5).join(', ')}`);
  if (ry && jy && ry < jy) cons.push(`ประสบการณ์ยังไม่ถึงเกณฑ์ (มี ${ry} ปี, ต้องการ ${jy} ปี)`);
  if (matched.length === 0) cons.push('ไม่พบทักษะที่ตรงกับ JD ในข้อมูล Resume');

  let summary = '';
  let recommend = '';
  if (overall >= 80) {
    summary = 'ผู้สมัครมีคุณสมบัติเหมาะสมสูงกับตำแหน่งนี้ ทั้งทักษะหลักและประสบการณ์ตรงกับความต้องการของ JD แนะนำให้นัดสัมภาษณ์';
    recommend = 'ควรนัดสัมภาษณ์';
  } else if (overall >= 60) {
    summary = 'ผู้สมัครมีคุณสมบัติพอใช้ได้ ทักษะส่วนใหญ่ตรง แต่ยังมีบางจุดที่ขาด อาจพิจารณาสัมภาษณ์เพื่อประเมินเชิงลึก';
    recommend = 'พิจารณานัดสัมภาษณ์';
  } else if (overall >= 40) {
    summary = 'ผู้สมัครมีทักษะบางส่วนตรง แต่ยังขาดทักษะสำคัญหลายอย่าง อาจไม่เหมาะตำแหน่งนี้โดยตรง แต่อาจเหมาะกับตำแหน่งอื่น';
    recommend = 'อาจเหมาะกับตำแหน่งอื่น';
  } else {
    summary = 'ผู้สมัครมีคุณสมบัติไม่ตรงกับ JD มากพอ แนะนำให้พิจารณาผู้สมัครรายอื่น';
    recommend = 'ไม่แนะนำให้สัมภาษณ์';
  }

  return {
    overallScore: overall,
    skillScore, expScore, eduScore: eduMatch,
    matchedSkills: matched, missingSkills: missing,
    candidateYears: ry, requiredYears: jy,
    summary, pros, cons, recommendation: recommend,
    computedAt: new Date().toISOString(),
  };
}

/* ---------- 5) ROUTING ---------- */
function navigate(hash) { window.location.hash = hash; }
window.addEventListener('hashchange', render);
window.addEventListener('load', render);

function render() {
  state = loadState(); session = loadSession();
  const hash = window.location.hash.slice(1) || '/';
  const root = $('#app');

  if (!session && !hash.startsWith('/login') && hash !== '/docs') {
    return renderLogin(root);
  }
  if (hash === '/' || hash.startsWith('/login')) return renderLogin(root);
  if (hash === '/docs') return renderDocs(root);

  if (session.role === 'hr') {
    if (hash === '/hr/dashboard') return renderHRDashboard(root);
    if (hash === '/hr/add') return renderAddCandidate(root);
    if (hash.startsWith('/hr/candidate/')) return renderCandidateDetail(root, hash.split('/').pop());
    if (hash === '/hr/summary') return renderHRSummary(root);
    if (hash === '/hr/compare' || hash.startsWith('/hr/compare/')) return renderHRCompare(root, hash.split('/')[3] || '');
    if (hash === '/hr/activity') return renderActivityLog(root);
    return renderHRDashboard(root);
  }
  if (session.role === 'executive') {
    if (hash === '/exec/dashboard') return renderExecDashboard(root);
    if (hash.startsWith('/exec/review/')) return renderExecReview(root, hash.split('/').pop());
    return renderExecDashboard(root);
  }
  if (session.role === 'admin') {
    if (hash === '/admin/users') return renderAdminUsers(root);
    if (hash === '/admin/positions') return renderAdminPositions(root);
    if (hash === '/admin/activity') return renderActivityLog(root);
    return renderAdminUsers(root);
  }
  return renderLogin(root);
}

function fileDropBlock(type, label, hint) {
  return `
    <label class="file-drop block">
      <input type="file" class="hidden" data-ftype="${type}" />
      <div class="text-2xl mb-2">${label.split(' ')[0]}</div>

      <div class="text-xs text-indigo-600 mt-2">คลิกเพื่ออัปโหลด</div>
    </label>`;
}
function attachFileInput(type) {
  document.querySelector(`input[data-ftype="${type}"]`)?.addEventListener('change', async (e) => {
    const f = e.target.files?.[0]; if (!f) return;
    const id = uid('f');
    try {
      const dataUrl = await readFileAsDataURL(f);
      setFileBlob(id, dataUrl);
    } catch (err) {
      return toast('อ่านไฟล์ไม่สำเร็จ', 'error');
    }
    _pendingFiles.push({ id, type, name: f.name, size: f.size, mime: f.type });
    refreshFilesList();
    toast(`แนบไฟล์ ${f.name} แล้ว`);
  });
}
function refreshFilesList() {
  const el = $('#filesList'); if (!el) return;
  if (_pendingFiles.length === 0) { el.innerHTML = ''; return; }
  el.innerHTML = `<div class="text-sm font-medium text-slate-700 mt-2">ไฟล์ที่จะแนบ (${_pendingFiles.length})</div>` +
    _pendingFiles.map(f => `

function fileIcon(type) {

function autoFillJD() {
  const pid = $('#f_position').value;
  if (!pid) return toast('เลือกตำแหน่งก่อน', 'warn');
  const jd = state.jobDescriptions.find(j => j.positionId === pid);
  if (jd) { $('#f_jd').value = jd.text; toast('ดึง JD เริ่มต้นแล้ว'); }
}
function submitAddCandidate(e) {
  e.preventDefault();
  const positionId = $('#f_position').value;
  if (!positionId) return toast('กรุณาเลือกตำแหน่ง', 'error');
  const resumeText = $('#f_resume').value.trim();
  const jdText = $('#f_jd').value.trim();
  const aiResult = runAIMatching(resumeText, jdText);

  const jdEntry = { id: uid('jd'), positionId, text: jdText, createdAt: new Date().toISOString() };
  state.jobDescriptions.push(jdEntry);

  const cand = {
    id: uid('c'), name: $('#f_name').value.trim(), email: $('#f_email').value.trim(), phone: $('#f_phone').value.trim(),
    positionId, jdId: jdEntry.id, addedBy: session.userId, addedAt: new Date().toISOString(),
    resumeText, hrNote: $('#f_note').value.trim(),
    status: 'evaluated', files: [..._pendingFiles], aiResult, hrReview: null, executiveReview: null, assignment: null,
  };
  state.candidates.unshift(cand);
  saveState(state);
  logActivity('create_candidate', 'candidate', cand.id, { name: cand.name, score: aiResult.overallScore });
  toast(`เพิ่มผู้สมัครและประเมิน AI สำเร็จ (${aiResult.overallScore}%)`);
  navigate(`/hr/candidate/${cand.id}`);
}

/* ---------- 11.5) HR COMPARE & SEND ----------
   หน้าเปรียบเทียบ AI หลายผู้สมัครในตำแหน่งเดียวกัน
   - HR เลือกผู้สมัครที่สนใจ (multi-select)
   - แนบไฟล์เสียงแนะนำ + ไฟล์เปรียบเทียบ ราย candidate
   - กดส่งเมล (mailto:) ให้ผู้บริหารทันที
*/
const _compareSelected = new Set();   // candidateIds ที่ HR เลือกในรอบนี้

function renderHRCompare(root, posIdParam = '') {
  // Backfill: ผู้สมัคร demo บางรายอาจมี status='evaluated' แต่ aiResult=null
  // → คำนวณให้อัตโนมัติเพื่อให้หน้าเปรียบเทียบใช้งานได้ทันที
  let backfilled = false;
  state.candidates.forEach(c => {
    if (!c.aiResult && c.resumeText) {
      const jd = state.jobDescriptions.find(j => j.id === c.jdId)
        || state.jobDescriptions.find(j => j.positionId === c.positionId);
      if (jd) { c.aiResult = runAIMatching(c.resumeText, jd.text); backfilled = true; }
    }
  });
  if (backfilled) saveState(state);

  const positions = state.positions;
  // หาตำแหน่งเริ่มต้น: ใช้ที่ส่งมาใน URL ถ้ามี ไม่งั้นเลือกตำแหน่งแรกที่มีผู้สมัครประเมินแล้ว
  let posId = posIdParam || '';
  if (!posId) {
    const evaluatedPos = state.candidates.filter(c => c.aiResult).map(c => c.positionId);
    posId = evaluatedPos[0] || positions[0]?.id || '';
  }
  const pos = positions.find(p => p.id === posId);
  // ผู้สมัครในตำแหน่งนี้ที่ยังไม่ส่ง/ยังประเมินอยู่ (รวม evaluated + pending_exec)
  const cands = state.candidates
    .filter(c => c.positionId === posId && c.aiResult)
    .filter(c => c.status === 'evaluated' || c.status === 'pending_exec' || c.status === 'sent_to_exec' || c.status === 'new')
    .sort((a,b) => (b.aiResult.overallScore||0) - (a.aiResult.overallScore||0));
  const execs = state.users.filter(u => u.role === 'executive');

  // ตัด selected ที่ไม่อยู่ในรายการนี้ออก (เผื่อสลับตำแหน่ง)
  const validIds = new Set(cands.map(c => c.id));
  [..._compareSelected].forEach(id => { if (!validIds.has(id)) _compareSelected.delete(id); });

  const content = `
    <div class="p-8">
      <div class="flex items-start justify-between mb-6 flex-wrap gap-3">
        <div>
          <h1 class="text-2xl font-bold text-slate-800">⚖️ เปรียบเทียบผู้สมัคร AI &amp; ส่งให้ผู้บริหาร</h1>
          <p class="text-slate-500 mt-1">เลือกผู้สมัครที่น่าสนใจ แนบไฟล์ และส่งเมลให้ผู้บริหารพิจารณาในหน้าเดียว</p>
        </div>
        <button class="btn-secondary" onclick="navigate('/hr/dashboard')">← กลับ Dashboard</button>
      </div>

      <div class="card p-4 mb-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-3 items-end">
          <div class="md:col-span-2">

async function onCmpAttach(e, candId, atype) {
  const f = e.target.files?.[0]; if (!f) return;
  const c = state.candidates.find(x => x.id === candId); if (!c) return;
  const id = uid('f');
  try {
    const dataUrl = await readFileAsDataURL(f);
    setFileBlob(id, dataUrl);
  } catch (err) { return toast('อ่านไฟล์ไม่สำเร็จ', 'error'); }
  // ถ้ามีของชนิดเดียวกันอยู่ ให้ทับ
  c.files = (c.files || []).filter(x => x.type !== atype);
  c.files.push({ id, type: atype, name: f.name, size: f.size, mime: f.type });
  saveState(state);
  logActivity('attach_file','candidate',c.id, { type: atype, name: f.name });
  toast(`แนบไฟล์ ${atype === 'audio' ? 'เสียง' : 'เปรียบเทียบ'} ของ ${c.name} แล้ว`);
  render();
}

function removeCmpAttach(candId, fileId) {
  const c = state.candidates.find(x => x.id === candId); if (!c) return;
  c.files = (c.files || []).filter(f => f.id !== fileId);
  delete _fileBlobs[fileId]; saveFileBlobs();
  saveState(state); toast('ลบไฟล์แล้ว'); render();
}

function buildEmailBody(pos, selected, intro) {
  const lines = [];
  lines.push(intro || '');
  lines.push('');
  lines.push('═══════════════════════════════════════');
  lines.push(`ตำแหน่งงาน: ${pos?.title || '-'} (${pos?.department || ''})`);
  lines.push(`จำนวนผู้สมัครที่คัดเลือก: ${selected.length} คน`);
  lines.push('═══════════════════════════════════════');
  lines.push('');
  selected.forEach((c, i) => {
    const ai = c.aiResult || {};
    lines.push(`[${i + 1}] ${c.name}`);
    lines.push(`    อีเมล: ${c.email} | โทร: ${c.phone || '-'}`);
    lines.push(`    AI Match: ${ai.overallScore || 0}% (${matchLabel(ai.overallScore || 0)}) — ${ai.recommendation || '-'}`);
    lines.push(`    คะแนนแยก: ทักษะ ${ai.skillScore||0}% | ประสบการณ์ ${ai.expScore||0}% | การศึกษา ${ai.eduScore||0}%`);
    if (ai.matchedSkills?.length) lines.push(`    ทักษะที่ตรง: ${ai.matchedSkills.slice(0, 8).join(', ')}`);
    if (ai.missingSkills?.length) lines.push(`    ทักษะที่ขาด: ${ai.missingSkills.slice(0, 6).join(', ')}`);
    if (c.hrNote) lines.push(`    ความเห็น HR: ${c.hrNote}`);
    if (ai.summary) lines.push(`    สรุป AI: ${ai.summary}`);
    const fileSummary = (c.files || []).map(f => f.name).join(', ');
    if (fileSummary) lines.push(`    ไฟล์แนบในระบบ: ${fileSummary}`);
    lines.push('');
  });
  lines.push('---');
  lines.push('โปรดเข้าระบบเพื่อดูไฟล์แนบ (Resume, JD, เสียงแนะนำ, เปรียบเทียบ) และบันทึกการประเมิน');
  return lines.join('\n');
}

function sendCompareEmail(posId) {
  const selected = [..._compareSelected].map(id => state.candidates.find(c => c.id === id)).filter(Boolean);
  if (selected.length === 0) return toast('ยังไม่ได้เลือกผู้สมัคร', 'error');
  const execIds = [...$('#cmp_exec').selectedOptions].map(o => o.value);
  if (execIds.length === 0) return toast('กรุณาเลือกผู้บริหารอย่างน้อย 1 คน', 'error');

  const pos = state.positions.find(p => p.id === posId);
  const subject = $('#cmp_subject').value || 'ขอความเห็นเกี่ยวกับผู้สมัคร';
  const intro = $('#cmp_msg').value || '';
  const toEmails = state.users.filter(u => execIds.includes(u.id)).map(u => u.email);
  const body = buildEmailBody(pos, selected, intro);

  // เปิด mailto: ในโปรแกรมเมลของเครื่อง
  const mailto = `mailto:${encodeURIComponent(toEmails.join(','))}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  // mailto มีข้อจำกัดความยาว — ตัดทอนถ้ายาวเกินไป
  const safeMailto = mailto.length > 8000
    ? `mailto:${encodeURIComponent(toEmails.join(','))}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body.slice(0, 6000) + '\n\n... (เนื้อหาถูกตัดเพราะยาวเกินขีดจำกัดของ mailto)')}`
    : mailto;
  window.location.href = safeMailto;

  // อัปเดตสถานะผู้สมัคร + สร้าง assignment
  const now = new Date().toISOString();
  selected.forEach(c => {
    // ถ้ายังไม่เคยส่ง → ส่งให้ exec แรกที่เลือก (mark sent_to_exec)
    if (c.status !== 'sent_to_exec') {
      c.status = 'sent_to_exec';
      c.assignment = {
        executiveId: execIds[0], submittedBy: session.userId, submittedAt: now,
        message: intro,
      };
    }
    // สร้าง assignment ทุก exec ที่เลือก (เพื่อให้ทุกคนเห็นในหน้าผู้บริหาร)
    execIds.forEach(eid => {
      const exists = state.reviewAssignments.find(a => a.candidateId === c.id && a.executiveId === eid && a.status !== 'done');
      if (!exists) {
        state.reviewAssignments.push({
          id: uid('a'), candidateId: c.id, executiveId: eid, hrId: session.userId,
          assignedAt: now, status: 'pending',
        });
      }
    });
  });
  saveState(state);
  logActivity('send_compare_email', 'candidate', null, {
    count: selected.length, candidateIds: selected.map(c=>c.id), execIds, position: pos?.title
  });
  _compareSelected.clear();
  toast(`เปิดโปรแกรมเมล ส่ง ${selected.length} คน ให้ผู้บริหาร ${execIds.length} ท่าน`);
  setTimeout(() => render(), 600);
}

function getFilteredCandidates() {
  const q = ($('#flt_search')?.value || '').toLowerCase();
  const pos = $('#flt_pos')?.value || '';
  const st = $('#flt_status')?.value || '';
  const ex = $('#flt_exec')?.value || '';
  const from = $('#flt_from')?.value;
  const to = $('#flt_to')?.value;
  const sort = $('#flt_sort')?.value || 'date_desc';

  let arr = state.candidates.filter(c => {
    if (q && !c.name.toLowerCase().includes(q)) return false;
    if (pos && c.positionId !== pos) return false;
    if (st && c.status !== st) return false;
    if (ex && c.assignment?.executiveId !== ex) return false;
    if (from && c.addedAt < from) return false;
    if (to && c.addedAt > to + 'T23:59:59') return false;
    return true;
  });
  arr.sort((a,b) => {
    if (sort === 'date_desc') return b.addedAt.localeCompare(a.addedAt);
    if (sort === 'date_asc') return a.addedAt.localeCompare(b.addedAt);
    if (sort === 'match_desc') return (b.aiResult?.overallScore||0) - (a.aiResult?.overallScore||0);
    if (sort === 'match_asc') return (a.aiResult?.overallScore||0) - (b.aiResult?.overallScore||0);
    return 0;
  });
  return arr;
}

function decisionRadios(selected='') {
  const opts = [
    { v:'interview', label:'✓ นัดสัมภาษณ์', desc:'ผู้สมัครเหมาะสมกับตำแหน่ง', cls:'emerald' },
    { v:'rejected', label:'✗ ไม่ผ่าน', desc:'ไม่เหมาะกับตำแหน่งหรือบริษัท', cls:'rose' },
    { v:'other_position', label:'↻ เหมาะกับตำแหน่งอื่น', desc:'มีศักยภาพ แต่ตำแหน่งอื่นเหมาะกว่า', cls:'orange' },
  ];
  return opts.map(o => `
    <label class="block border-2 rounded-xl p-3 cursor-pointer hover:border-${o.cls}-400 transition ${selected===o.v?`border-${o.cls}-500 bg-${o.cls}-50`:'border-slate-200'}">
      <input type="radio" name="decision" value="${o.v}" class="hidden" ${selected===o.v?'checked':''} />
      <div class="font-medium text-slate-800">${o.label}</div>
      <div class="text-xs text-slate-500 mt-1">${o.desc}</div>
    </label>`).join('');
}
function submitExecReview(id) {
  const sel = document.querySelector('input[name="decision"]:checked');
  if (!sel) return toast('กรุณาเลือกผลการพิจารณา', 'error');
  const c = state.candidates.find(x => x.id === id);
  c.executiveReview = {
    reviewerId: session.userId, decision: sel.value,
    comment: $('#ex_comment').value.trim(), evaluatedAt: new Date().toISOString(),
  };
  c.status = sel.value;
  const a = state.reviewAssignments.find(x => x.candidateId === c.id && x.executiveId === session.userId);
  if (a) a.status = 'done';
  saveState(state);
  logActivity('exec_review','candidate',c.id, { decision: sel.value });
  toast('บันทึกการประเมินแล้ว');
  navigate('/exec/dashboard');
}

/* ---------- FILE VIEWER (in-page preview for PDF / image / audio / text) ---------- */
function detectViewerKind(file, dataUrl) {
  // Prefer the actual data URL mime if available (more reliable than user-supplied metadata)
  if (dataUrl) {
    const m = dataUrl.match(/^data:([^;,]+)/);
    if (m) {
      const mime = m[1].toLowerCase();
      if (mime.startsWith('audio/')) return 'audio';
      if (mime.startsWith('video/')) return 'video';
      if (mime.startsWith('image/')) return 'image';
      if (mime === 'application/pdf') return 'pdf';
      if (mime.startsWith('text/')) return 'text';
    }
  }
  const mime = (file.mime || '').toLowerCase();
  const name = (file.name || '').toLowerCase();
  if (mime.startsWith('audio/') || /\.(mp3|m4a|wav|ogg|aac|flac)$/.test(name)) return 'audio';
  if (mime.startsWith('video/') || /\.(mp4|webm|mov)$/.test(name)) return 'video';
  if (mime.startsWith('image/') || /\.(png|jpe?g|gif|webp|svg|bmp)$/.test(name)) return 'image';
  if (mime === 'application/pdf' || /\.pdf$/.test(name)) return 'pdf';
  if (mime.startsWith('text/') || /\.(txt|csv|md|json|log)$/.test(name)) return 'text';
  if (/\.(docx?|xlsx?|pptx?)$/.test(name)) return 'office';
  return 'other';
}
function downloadFile(fileId, name) {
  const data = getFileBlob(fileId);
  if (!data) return toast('ไม่มีข้อมูลไฟล์ (เป็นไฟล์ตัวอย่าง demo)', 'warn');
  const a = document.createElement('a');
  a.href = data; a.download = name || 'file';
  document.body.appendChild(a); a.click(); a.remove();
}
function openFileViewer(fileId) {
  // find the file metadata anywhere in candidates
  let file = null, candName = '';
  for (const c of state.candidates) {
    const f = (c.files || []).find(x => x.id === fileId);
    if (f) { file = f; candName = c.name; break; }
  }
  if (!file) return toast('ไม่พบไฟล์', 'error');

  const data = getFileBlob(fileId);
  const kind = detectViewerKind(file, data);
  const root = $('#modal-root');

  let body = '';
  if (!data) {
    body = `
      <div class="p-10 text-center">
        <div class="text-5xl mb-3">📦</div>
        <div class="font-semibold text-slate-800 mb-1">ไฟล์ตัวอย่าง (Demo)</div>
        <div class="text-sm text-slate-500">ไฟล์นี้เป็นข้อมูลจำลองในระบบ Demo ยังไม่มีเนื้อหาไฟล์จริง<br>กรุณาอัปโหลดไฟล์จริงเพื่อดู/ฟังในหน้านี้</div>
      </div>`;
  } else if (kind === 'pdf') {
    body = `<iframe src="${data}" style="width:100%; height:78vh; border:0; border-radius:8px; background:#f1f5f9;"></iframe>`;
  } else if (kind === 'image') {
    body = `<div class="flex items-center justify-center bg-slate-50 rounded-lg p-3" style="max-height:78vh; overflow:auto;">
              <img src="${data}" alt="${file.name}" style="max-width:100%; height:auto; border-radius:6px;" />
            </div>`;
  } else if (kind === 'audio') {
    body = `
      <div class="p-6 bg-gradient-to-br from-indigo-50 to-purple-50 rounded-lg">
        <div class="flex items-center gap-4 mb-4">
          <div class="w-16 h-16 rounded-2xl brand-gradient flex items-center justify-center text-3xl">🎙️</div>
          <div class="min-w-0">
            <div class="font-semibold text-slate-800 truncate">${file.name}</div>
            <div class="text-xs text-slate-500">${(file.mime||'audio').toUpperCase()} • ${sizeFmt(file.size)}</div>
            ${candName ? `<div class="text-xs text-slate-500 mt-0.5">ผู้สมัคร: ${candName}</div>` : ''}
          </div>
        </div>
        <audio controls preload="metadata" src="${data}" style="width:100%;">
          เบราว์เซอร์ของคุณไม่รองรับการเล่นเสียง
        </audio>
      </div>`;
  } else if (kind === 'video') {
    body = `<video controls style="width:100%; max-height:78vh; border-radius:8px; background:#000;">
              <source src="${data}" type="${file.mime || ''}" />
            </video>`;
  } else if (kind === 'text') {
    body = `<pre id="textPreview" class="text-xs p-4 bg-slate-900 text-slate-100 rounded-lg overflow-auto" style="max-height:78vh; white-space:pre-wrap;">กำลังโหลด...</pre>`;
  } else if (kind === 'office') {
    body = `
      <div class="p-10 text-center">
        <div class="text-5xl mb-3">📄</div>
        <div class="font-semibold text-slate-800 mb-1">${file.name}</div>
        <div class="text-sm text-slate-500 mb-4">${(file.mime||'').toUpperCase() || 'Office Document'} • ${sizeFmt(file.size)}</div>
        <div class="text-xs text-slate-500 mb-4">เบราว์เซอร์ไม่รองรับการเปิดไฟล์ Office โดยตรง<br>กดดาวน์โหลดเพื่อเปิดด้วยโปรแกรมในเครื่อง</div>
        <button class="btn-primary" onclick="downloadFile('${fileId}', '${file.name.replace(/'/g,"\\'")}')">⬇ ดาวน์โหลดไฟล์</button>
      </div>`;
  } else {
    body = `
      <div class="p-10 text-center">
        <div class="text-5xl mb-3">📎</div>
        <div class="font-semibold text-slate-800 mb-1">${file.name}</div>
        <div class="text-sm text-slate-500 mb-4">${(file.mime||'ไม่ทราบประเภทไฟล์').toUpperCase()} • ${sizeFmt(file.size)}</div>
        <button class="btn-primary" onclick="downloadFile('${fileId}', '${file.name.replace(/'/g,"\\'")}')">⬇ ดาวน์โหลดไฟล์</button>
      </div>`;
  }

  root.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal" style="max-width: 920px;">
        <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between gap-3">
          <div class="min-w-0">
            <h3 class="font-semibold text-slate-800 truncate">${fileIcon(file.type)} ${file.name}</h3>
            <div class="text-xs text-slate-500 mt-0.5">${(file.mime||file.type||'').toUpperCase()} • ${sizeFmt(file.size)}${candName ? ' • '+candName : ''}</div>
          </div>
          <div class="flex items-center gap-2 flex-shrink-0">
            ${data ? `<button class="btn-secondary" onclick="downloadFile('${fileId}', '${file.name.replace(/'/g,"\\'")}')">⬇ ดาวน์โหลด</button>` : ''}
            <button class="text-slate-400 hover:text-slate-700 text-xl" onclick="closeModal()">✕</button>
          </div>
        </div>
        <div class="p-4">${body}</div>
      </div>
    </div>`;

  // For text files, fetch and render content
  if (data && kind === 'text') {
    fetch(data).then(r => r.text()).then(t => {
      const el = document.getElementById('textPreview');
      if (el) el.textContent = t;
    }).catch(() => {
      const el = document.getElementById('textPreview');
      if (el) el.textContent = '(อ่านไฟล์ไม่สำเร็จ)';
    });
  }
}

    <h2>AI Matching Logic</h2>
    <h3>Pipeline</h3>
    <ol>
      <li><strong>Input:</strong> Resume text + JD text + (optional) Resume PDF/DOCX</li>
      <li><strong>Pre-processing:</strong>
        <ul>
          <li>ถ้าเป็นไฟล์ → ใช้ pdf-parse / mammoth สำหรับ DOCX → ได้ raw text</li>
          <li>Normalize whitespace, lowercase สำหรับ matching</li>
          <li>Sanitize (remove emojis, special chars สำหรับ skill extraction)</li>
        </ul>
      </li>

    <h3>Row-Level Security (Supabase RLS) ตัวอย่าง</h3>
    <pre><code>-- HR เห็นทุก candidate
CREATE POLICY "hr_select_all" ON candidates FOR SELECT
  USING (auth.role() = 'hr' OR auth.role() = 'admin');

-- Executive เห็นเฉพาะที่ assigned ให้ตัวเอง
CREATE POLICY "exec_select_assigned" ON candidates FOR SELECT
  USING (
    auth.role() = 'executive'
    AND EXISTS (
      SELECT 1 FROM review_assignments ra
      WHERE ra.candidate_id = candidates.id
        AND ra.executive_id = auth.uid()
    )
  );

-- HR สร้าง candidate ได้
CREATE POLICY "hr_insert" ON candidates FOR INSERT
  WITH CHECK (auth.role() IN ('hr', 'admin'));

-- HR แก้ไขได้เฉพาะของตัวเอง (ก่อนส่ง exec)
CREATE POLICY "hr_update_own" ON candidates FOR UPDATE
  USING (auth.role() = 'hr' AND added_by = auth.uid() AND status != 'sent_to_exec');</code></pre>
